name: kudo
services:
  database:
    image: postgres:17.2
    ports: [5433:5432]
    container_name: kudo-database
    hostname: database
    restart: always
    volumes: [database:/var/lib/postgresql/data]
    env_file: .env
    networks: [database]
    environment:
      POSTGRES_DB: kudo
      POSTGRES_USER: kudo_admin
      POSTGRES_PASSWORD: kudo_admin123!
  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    ports:
      - '9000:9000'
      - '9001:9001'
    environment:
      - MINIO_ROOT_USER=minio  
      - MINIO_ROOT_PASSWORD=minio123!
    volumes:
      - minio_data:/bitnami/minio/data
    networks:
      - minio

  redis-cache:
    image: redis:alpine
    container_name: redis-cache
    hostname: redis-cache
    volumes:
      - redis_cache_data:/data
    networks:
      - redis-cache
    environment:
      - REDIS_PASSWORD=redis123!
    ports: [6379:6379]
    command: redis-server --requirepass ${REDIS_PASSWORD} --save 60 1 
    
networks:
  database:
  minio:
  redis-cache:

volumes:
  database:
  minio_data:
  redis_cache_data:
