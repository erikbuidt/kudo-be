name: kudo-platform

services:
  database:
    image: postgres:17.2-alpine
    container_name: kudo-database
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - kudo_db_data:/var/lib/postgresql/data
    networks:
      - kudo-network

  redis:
    image: redis:7-alpine
    container_name: kudo-redis
    restart: always
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - kudo_redis_data:/data
    networks:
      - kudo-network

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: kudo-minio
    restart: always
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9000:9000"
      - "9001:9001"
    command: server /data --console-address ":9001"
    volumes:
      - kudo_minio_data:/data
    networks:
      - kudo-network

  backend:
    image: ${BACKEND_IMAGE:-ghcr.io/erikbuidt/kudo-be:main}
    container_name: kudo-backend
    restart: always
    environment:
      SEED_DATABASE: "true"
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@database:5432/${POSTGRES_DB}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET_NAME: ${MINIO_BUCKET_NAME:-kudo}
      MINIO_PUBLIC_URL: ${MINIO_PUBLIC_URL}
      JWT_SECRET: ${JWT_SECRET}
      APP_PORT: ${APP_PORT:-3000}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_REDIRECT_URL: ${GOOGLE_REDIRECT_URL}
      FRONTEND_URL: ${FRONTEND_URL}
    ports:
      - "${APP_PORT:-3000}:3000"
    depends_on:
      - database
      - redis
      - minio
    networks:
      - kudo-network

  frontend:
    image: ${FRONTEND_IMAGE:-ghcr.io/erikbuidt/kudo-fe:main}
    container_name: kudo-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - kudo-network

networks:
  kudo-network:
    driver: bridge

volumes:
  kudo_db_data:
  kudo_redis_data:
  kudo_minio_data:
